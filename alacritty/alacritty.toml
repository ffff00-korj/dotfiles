[cursor.vi_mode_style]
shape = "Block"

[font]
size = 10.5
offset.y = 2
glyph_offset.y = 1

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "SemiBold"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "SemiBold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "SemiBold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "SemiBold Italic"

[window]
opacity = 0.99

[window.dimensions]
columns = 140
lines = 40

[general]
import = [
    "~/.config/alacritty/themes/themes/base16_default_dark.toml"
]
